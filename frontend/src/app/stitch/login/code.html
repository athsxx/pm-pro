<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        h1, h2, h3, h4, h5, h6, .font-heading {
            font-family: 'Outfit', sans-serif;
        }
        
        /* Custom Input Styles to match PRD requirements */
        .input-field {
            height: 56px;
            border: 1px solid var(--border-color, #E2E8F0);
            border-radius: 8px; /* matching --radius-button */
            padding: 0 16px;
            font-size: 16px;
            color: var(--text-main, #334155);
            background-color: transparent;
            width: 100%;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        
        .input-field:focus {
            outline: none;
            border-color: var(--accent, #2563EB);
            box-shadow: 0 0 0 1px var(--accent, #2563EB);
        }
        
        .input-field.error {
            border-color: var(--error, #EF4444);
        }
        
        .input-field.error:focus {
            box-shadow: 0 0 0 1px var(--error, #EF4444);
        }

        .input-label {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted, #94A3B8);
            font-size: 16px;
            pointer-events: none;
            transition: all 0.2s ease;
            background-color: var(--background-light, #F8FAFC);
            padding: 0 4px;
        }
        
        .input-field:focus ~ .input-label,
        .input-field:not(:placeholder-shown) ~ .input-label {
            top: 0;
            font-size: 12px;
            color: var(--accent, #2563EB);
        }
        
        .input-field.error:focus ~ .input-label,
        .input-field.error:not(:placeholder-shown) ~ .input-label {
            color: var(--error, #EF4444);
        }
        
        .btn-primary {
            height: 56px;
            background-color: var(--primary, #0F172A);
            color: white;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 15px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }
        
        .btn-primary:active {
            transform: scale(0.98);
        }
    </style>

<body class="bg-background-light dark:bg-background-dark text-text-main antialiased min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Main Container: Vertically centered, heavy top whitespace handled by flex-grow and padding -->
<main class="w-full max-w-md px-6 flex flex-col h-full min-h-screen">
<!-- Top Whitespace Spacer -->
<div class="flex-grow flex items-center justify-center pb-12">
<!-- Logo Mark: 48x48px, deep navy icon -->
<div class="w-12 h-12 bg-primary rounded-lg flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-white text-3xl" data-icon="task_alt">task_alt</span>
</div>
</div>
<!-- Form Area: Anchored to bottom third -->
<div class="w-full pb-12 flex-shrink-0">
<h1 class="font-heading text-[32px] font-semibold text-primary mb-8 text-center">Welcome back</h1>
<form action="#" class="space-y-6">
<!-- Email Input Area -->
<div class="relative w-full">
<input class="input-field" id="email" placeholder=" " required="" type="email"/>
<label class="input-label" for="email">Email address</label>
</div>
<!-- Password Input Area (Showing an Error State for demonstration as requested in PRD) -->
<div class="relative w-full">
<input class="input-field error" id="password" placeholder=" " required="" type="password" value="invalidpass"/>
<label class="input-label" for="password">Password</label>
<!-- Error Text: 13px red error text below input -->
<p class="text-[13px] text-error mt-1 font-medium absolute -bottom-5 left-0">Incorrect password. Please try again.</p>
</div>
<div class="pt-4">
<!-- Login Button: 56px height, full-width, primary background -->
<button class="btn-primary" type="button">
                        Log In
                    </button>
</div>
</form>
<!-- Optional subtle link -->
<div class="mt-8 text-center">
<a class="text-[13px] font-semibold text-muted hover:text-primary transition-colors" href="#">Forgot your password?</a>
</div>
</div>
</main>
