<main class="flex-1 overflow-y-auto">

<!-- Item 1: Unread, Normal -->
<a class="relative flex items-start gap-4 p-5 border-b border-border-light dark:border-border-dark bg-surface dark:bg-surface-dark hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors active:bg-slate-100 dark:active:bg-slate-800 block group" href="#">

<div class="flex items-center justify-between gap-2">
<h3 class="text-base font-bold text-slate-900 dark:text-slate-100 leading-tight">Project Alpha Launch</h3>
<span class="text-xs font-medium text-text-muted shrink-0 whitespace-nowrap">10m ago</span>
</div>
<p class="text-sm font-medium text-text-main dark:text-text-main-dark">Assigned a new task: Review final assets</p>
</div>
</a>
<!-- Item 2: Unread, Urgent/Overdue -->
<a class="relative flex items-start gap-4 p-5 border-b border-border-light dark:border-border-dark bg-surface dark:bg-surface-dark hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors active:bg-slate-100 dark:active:bg-slate-800 block group" href="#">

<div class="absolute top-7 left-3 w-2 h-2 rounded-full bg-primary mt-1"></div>

<div class="flex-1 pl-4 flex flex-col gap-1.5">
<div class="flex items-center justify-between gap-2">
<div class="flex items-center gap-2 flex-wrap">

<span class="inline-flex items-center px-2 py-0.5 rounded text-[11px] font-bold bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400 uppercase tracking-wider">
                                Overdue
                            </span>
</div>
<span class="text-xs font-medium text-text-muted shrink-0 whitespace-nowrap">1h ago</span>
</div>
<p class="text-sm font-medium text-text-main dark:text-text-main-dark">Deadline passed</p>
</div>
</a>
<!-- Item 3: Read, Normal -->
<a class="relative flex items-start gap-4 p-5 border-b border-border-light dark:border-border-dark bg-surface dark:bg-surface-dark hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors active:bg-slate-100 dark:active:bg-slate-800 block group opacity-80" href="#">

<div class="w-2 h-2 absolute top-7 left-3 opacity-0"></div>

<h3 class="text-base font-semibold text-slate-700 dark:text-slate-300 leading-tight">Weekly Sync</h3>
<span class="text-xs font-medium text-text-muted shrink-0 whitespace-nowrap">Yesterday</span>
</div>
<p class="text-sm font-normal text-slate-500 dark:text-slate-400">Mentioned you in a comment</p>
</div>
</a>

<span class="text-xs font-medium text-text-muted shrink-0 whitespace-nowrap">Oct 24</span>
</div>
<p class="text-sm font-normal text-slate-500 dark:text-slate-400">App updated to version 2.1.0</p>
</div>
</a>
